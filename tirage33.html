<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tirage Concours</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #002b5c, #005eb8);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 10px;
        }

        #container {
            display: flex;
            flex-direction: column;
            max-width: 500px;
            margin: 0 auto;
            gap: 15px;
        }

        #gauche {
            flex: 1;
            text-align: center;
            padding: 15px 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            order: 1;
        }

        #droite {
            background: #00142d;
            border: 2px solid gold;
            border-radius: 15px;
            padding: 15px;
            order: 2;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            word-wrap: break-word;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 15px;
            word-wrap: break-word;
        }

        #logo {
            width: 200px;
            max-width: 80%;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        #roulette {
            width: 100%;
            min-height: 80px;
            height: auto;
            padding: 15px;
            margin: 15px auto;
            border: 4px solid gold;
            border-radius: 15px;
            background: white;
            color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: bold;
            word-wrap: break-word;
            text-align: center;
            transition: all 0.3s;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: gold;
            font-size: 18px;
            font-weight: bold;
            flex: 1;
            min-width: 120px;
            touch-action: manipulation;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            opacity: 0.5;
            transform: none;
            pointer-events: none;
        }

        .btn-enregistrer {
            background: #ff4444;
            color: white;
        }

        .btn-enregistrer.recording {
            background: #ff0000;
            animation: pulse 1s infinite;
        }

        .btn-capture {
            background: #44aaff;
            color: white;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .btn-telecharger {
            background: #44dd88;
            color: white;
        }

        #gagnants {
            margin-top: 25px;
            font-size: 22px;
            line-height: 45px;
        }

        #gagnants div {
            background: rgba(255, 215, 0, 0.1);
            border-radius: 8px;
            padding: 5px;
            margin: 3px 0;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: white;
            color: #111;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            resize: vertical;
            font-size: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: white;
            color: #111;
        }

        #nbParticipants {
            margin-top: 10px;
            color: gold;
            font-weight: bold;
            font-size: 16px;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            animation: tombe 3s linear forwards;
            pointer-events: none;
            z-index: 9999;
        }

        @keyframes tombe {
            from {
                transform: translateY(-50px) rotate(0deg);
                opacity: 1;
            }
            to {
                transform: translateY(120vh) rotate(900deg);
                opacity: 0;
            }
        }

        /* Status d'enregistrement */
        #recordingStatus {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 0, 0, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            z-index: 10000;
            display: none;
            animation: pulse 1s infinite;
        }

        /* Bannière d'information - version discrète */
        #infoBanner {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            padding: 8px 12px;
            margin: 10px 0 5px 0;
            font-size: 13px;
            display: none;
            text-align: center;
            color: #ffd700;
            line-height: 1.4;
        }

        #infoBanner.show {
            display: block;
        }

        #infoBanner .icon {
            font-size: 16px;
        }

        #infoBanner .details {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 3px;
        }

        /* Ajustements pour très petits écrans */
        @media (max-width: 400px) {
            h1 {
                font-size: 20px;
            }
            h2 {
                font-size: 16px;
            }
            #roulette {
                font-size: 18px;
                min-height: 70px;
                padding: 10px;
            }
            button {
                font-size: 16px;
                padding: 10px 15px;
                min-width: 100px;
            }
            #gagnants {
                font-size: 18px;
                line-height: 38px;
            }
            textarea {
                height: 150px;
            }
            #infoBanner {
                font-size: 12px;
                padding: 6px 10px;
            }
        }

        /* Mode paysage */
        @media (orientation: landscape) and (max-height: 500px) {
            #container {
                flex-direction: row;
                flex-wrap: wrap;
                max-width: 100%;
            }
            #gauche {
                flex: 2;
                min-width: 60%;
                order: 1;
            }
            #droite {
                flex: 1;
                min-width: 35%;
                order: 2;
                max-height: 90vh;
                overflow-y: auto;
            }
            textarea {
                height: 120px;
            }
            #roulette {
                min-height: 60px;
                font-size: 18px;
            }
            h1 {
                font-size: 20px;
            }
            h2 {
                font-size: 15px;
            }
        }

        /* Impression */
        @media print {
            body {
                background: white !important;
                color: black !important;
            }
            #droite {
                display: none !important;
            }
            #gauche {
                background: white !important;
                border: 2px solid #333 !important;
            }
            #roulette {
                border-color: #333 !important;
                background: #f5f5f5 !important;
                color: #000 !important;
            }
            button {
                display: none !important;
            }
            .confetti {
                display: none !important;
            }
            #recordingStatus {
                display: none !important;
            }
            #infoBanner {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <!-- Status d'enregistrement -->
    <div id="recordingStatus">🔴 ENREGISTREMENT EN COURS</div>

    <div id="container">
        <div id="gauche">
            <h1 id="titreAffiche">🏆 Tirage du concours</h1>
            <h2 id="soustitreAffiche">⚽ Coupe du Monde</h2>
            <img id="logo" src="https://github.com/caprarof/100AKA/blob/main/100FANZONE.jpeg" alt="Logo" style="max-width:100%;height:auto;">

            <div id="roulette">Prêt ?</div>

            <div class="button-group">
                <button onclick="lancerTirage()" id="btnLancer">🎲 Lancer</button>
                <button onclick="resetTirage()">🔄 Reset</button>
            </div>

            <div class="button-group">
                <button id="btnEnregistrer" onclick="demarrerEnregistrement()" class="btn-enregistrer">
                    🎬 Enregistrer
                </button>
                <button onclick="capturePNG()" class="btn-capture">
                    📸 PNG
                </button>
                <button onclick="telechargerGIF()" class="btn-telecharger">
                    ⬇️ GIF
                </button>
            </div>

            <div id="gagnants"></div>
        </div>

        <div id="droite">
            <!-- Bannière d'information discrète -->
            <div id="infoBanner">
                <span class="icon">ℹ️</span> 
                <span id="infoMessage">Enregistrement non disponible sur ce navigateur</span>
                <div class="details">Utilisez l'enregistreur d'écran intégré de votre téléphone</div>
            </div>

            <h2 style="font-size:18px;margin-bottom:10px;">⚙️ Configuration</h2>

            <label>Titre</label>
            <input id="titre" value="🏆 Tirage du Concours Pronostic">

            <label>Sous-titre</label>
            <input id="soustitre" value="⚽ France - Suède">

            <label>Nombre de gagnants</label>
            <select id="nbGagnants">
                <option value="1">1 gagnant</option>
                <option value="2">2 gagnants</option>
                <option value="3">3 gagnants</option>
            </select>

            <label>Participants (un par ligne)</label>
            <textarea id="listeParticipants">
M. joueur A
M. joueur B
M. joueur C
M. joueur D
            </textarea>

            <div id="nbParticipants"></div>

            <button onclick="majAffichage()" style="width:100%;margin-top:10px;">✔ Mettre à jour</button>
        </div>
    </div>

    <script>
        // ============ VARIABLES GLOBALES ============
        let participants = [];
        let deja = [];
        let enCours = false;
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        let captureStream = null;

        // ============ FONCTIONS DE BASE ============

        function chargerParticipants() {
            const textarea = document.getElementById("listeParticipants");
            participants = textarea.value
                .split("\n")
                .map(x => x.trim())
                .filter(x => x !== "");
            document.getElementById("nbParticipants").innerHTML =
                "👥 " + participants.length + " participant(s)";
            
            if (participants.length === 0 && !enCours) {
                document.getElementById("roulette").innerHTML = "Ajoutez des participants";
            } else if (!enCours && document.getElementById("roulette").innerHTML === "Ajoutez des participants") {
                document.getElementById("roulette").innerHTML = "Prêt ?";
            }
        }

        function majAffichage() {
            document.getElementById("titreAffiche").innerHTML =
                document.getElementById("titre").value || "🏆 Tirage";
            document.getElementById("soustitreAffiche").innerHTML =
                document.getElementById("soustitre").value || "Concours";
        }

        // ============ FONCTION TIRAGE SIMPLIFIÉE ============

        function lancerTirage() {
            // Empêcher les clics multiples
            if (enCours) {
                console.log("Tirage déjà en cours");
                return;
            }
            
            // Charger les participants
            chargerParticipants();
            
            // Vérifier qu'il y a des participants
            if (participants.length === 0) {
                alert("⚠️ Veuillez saisir au moins un participant.");
                return;
            }

            // Vérifier le nombre de gagnants
            let nb = parseInt(document.getElementById("nbGagnants").value);
            if (participants.length < nb) {
                alert(`⚠️ Il n'y a que ${participants.length} participant(s) pour ${nb} gagnant(s).`);
                return;
            }

            // Démarrer le tirage
            enCours = true;
            deja = [];
            document.getElementById("gagnants").innerHTML = "";
            const btnLancer = document.getElementById("btnLancer");
            btnLancer.disabled = true;
            document.getElementById("roulette").style.borderColor = "orange";
            
            // Lancer le tirage avec setTimeout pour laisser le temps à l'UI de se mettre à jour
            setTimeout(() => {
                effectuerTirage(nb);
            }, 100);
        }

        function effectuerTirage(nb) {
            let tour = 1;
            
            function prochainTour() {
                if (!enCours || tour > nb) {
                    finTirage();
                    return;
                }
                
                // Animation de la roulette (10 tours rapides)
                let compteur = 0;
                const maxCompteur = 15;
                
                function animerRoulette() {
                    if (!enCours || compteur >= maxCompteur) {
                        // Sélectionner le gagnant
                        const disponibles = participants.filter(x => !deja.includes(x));
                        if (disponibles.length === 0) {
                            finTirage();
                            return;
                        }
                        
                        const gagnant = disponibles[Math.floor(Math.random() * disponibles.length)];
                        deja.push(gagnant);
                        document.getElementById("roulette").innerHTML = "🏆 " + gagnant;
                        
                        // Afficher le gagnant
                        let medaille = "🥇";
                        if (tour === 2) medaille = "🥈";
                        if (tour === 3) medaille = "🥉";
                        if (tour > 3) medaille = `#${tour}`;
                        
                        const div = document.createElement("div");
                        div.innerHTML = medaille + " <b>" + gagnant + "</b>";
                        document.getElementById("gagnants").appendChild(div);
                        
                        // Confettis
                        confettis();
                        
                        // Passer au tour suivant
                        tour++;
                        setTimeout(prochainTour, 2500);
                        return;
                    }
                    
                    // Afficher un nom aléatoire
                    const randomIndex = Math.floor(Math.random() * participants.length);
                    document.getElementById("roulette").innerHTML = participants[randomIndex] || "---";
                    compteur++;
                    setTimeout(animerRoulette, 50 + compteur * 5);
                }
                
                animerRoulette();
            }
            
            function finTirage() {
                enCours = false;
                document.getElementById("btnLancer").disabled = false;
                document.getElementById("roulette").style.borderColor = "gold";
                
                // Arrêter l'enregistrement si actif
                if (isRecording && mediaRecorder && mediaRecorder.state === 'recording') {
                    setTimeout(() => {
                        if (isRecording && mediaRecorder && mediaRecorder.state === 'recording') {
                            mediaRecorder.stop();
                        }
                    }, 2000);
                }
            }
            
            prochainTour();
        }

        function resetTirage() {
            enCours = false;
            deja = [];
            document.getElementById("roulette").innerHTML = "Prêt ?";
            document.getElementById("roulette").style.borderColor = "gold";
            document.getElementById("gagnants").innerHTML = "";
            document.getElementById("btnLancer").disabled = false;
            
            if (isRecording && mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
        }

        // ============ CONFETTIS ============

        function confettis() {
            const couleurs = ["#ff0000", "#00ff00", "#0099ff", "#ffff00", "#ff00ff", "#ffffff", "#ff8800", "#ff6b6b", "#4ecdc4", "#45b7d1"];
            for (let i = 0; i < 150; i++) {
                setTimeout(() => {
                    let c = document.createElement("div");
                    c.className = "confetti";
                    c.style.left = Math.random() * window.innerWidth + "px";
                    c.style.top = "-20px";
                    c.style.background = couleurs[Math.floor(Math.random() * couleurs.length)];
                    c.style.width = (6 + Math.random() * 8) + "px";
                    c.style.height = c.style.width;
                    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    c.style.animationDuration = (2 + Math.random() * 2) + "s";
                    c.style.transform = `rotate(${Math.random() * 360}deg)`;
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 4000);
                }, i * 20);
            }
        }

        // ============ ENREGISTREMENT ============

        function verifierSupportEnregistrement() {
            const infoBanner = document.getElementById('infoBanner');
            const infoMessage = document.getElementById('infoMessage');
            const support = !!(navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia);
            
            if (!support) {
                infoBanner.classList.add('show');
                infoMessage.textContent = '📱 Enregistrement non supporté sur ce navigateur';
                document.querySelector('#infoBanner .details').textContent = 
                    'Utilisez l\'enregistreur d\'écran intégré de votre téléphone';
            } else {
                infoBanner.classList.remove('show');
            }
            
            return support;
        }

        async function demarrerEnregistrement() {
            const btn = document.getElementById('btnEnregistrer');
            
            if (isRecording) {
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                }
                isRecording = false;
                btn.innerHTML = '🎬 Enregistrer';
                btn.classList.remove('recording');
                document.getElementById('recordingStatus').style.display = 'none';
                return;
            }

            if (!verifierSupportEnregistrement()) {
                alert("ℹ️ L'enregistrement d'écran n'est pas supporté.\n\nUtilisez l'enregistreur intégré de votre téléphone.");
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        frameRate: { ideal: 30 }
                    },
                    audio: false
                });

                let mimeType = 'video/webm;codecs=vp9';
                if (!MediaRecorder.isTypeSupported(mimeType)) {
                    mimeType = 'video/webm;codecs=vp8';
                    if (!MediaRecorder.isTypeSupported(mimeType)) {
                        mimeType = 'video/webm';
                    }
                }

                captureStream = stream;
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: mimeType,
                    videoBitsPerSecond: 2500000
                });

                recordedChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    if (recordedChunks.length > 0) {
                        const blob = new Blob(recordedChunks, { type: 'video/webm' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `tirage_${new Date().toISOString().slice(0,10)}.webm`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        setTimeout(() => URL.revokeObjectURL(url), 5000);
                    }
                    
                    if (captureStream) {
                        captureStream.getTracks().forEach(track => track.stop());
                        captureStream = null;
                    }
                    
                    isRecording = false;
                    btn.innerHTML = '🎬 Enregistrer';
                    btn.classList.remove('recording');
                    document.getElementById('recordingStatus').style.display = 'none';
                };

                mediaRecorder.start(1000);
                isRecording = true;
                btn.innerHTML = '⏹️ Arrêter';
                btn.classList.add('recording');
                document.getElementById('recordingStatus').style.display = 'block';

                stream.getVideoTracks()[0].addEventListener('ended', () => {
                    if (isRecording && mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                });

            } catch (err) {
                console.error("Erreur d'enregistrement:", err);
                alert("❌ Impossible de démarrer l'enregistrement.\n\nUtilisez l'enregistreur intégré de votre téléphone.");
            }
        }

        // ============ CAPTURE PNG ============

        async function capturePNG() {
            try {
                const element = document.getElementById('gauche');
                
                if (typeof html2canvas === 'undefined' && !window.html2canvas) {
                    const script = document.createElement('script');
                    script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
                    document.head.appendChild(script);
                    await new Promise(resolve => setTimeout(resolve, 2000));
                }
                
                const h2c = html2canvas || window.html2canvas;
                if (h2c) {
                    const canvas = await h2c(element, {
                        scale: 2,
                        backgroundColor: '#002b5c',
                        allowTaint: true,
                        useCORS: true,
                        logging: false
                    });
                    
                    const link = document.createElement('a');
                    link.download = `tirage_${new Date().toISOString().slice(0,10)}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    return;
                }
                
                alert("📸 Utilisez la capture d'écran de votre téléphone.");
            } catch (err) {
                console.error("Erreur de capture:", err);
                alert("📸 Utilisez la capture d'écran de votre téléphone.");
            }
        }

        // ============ TELECHARGER EN GIF ============

        function telechargerGIF() {
            alert(`📹 Pour un GIF animé :
1️⃣ Enregistrez avec l'enregistreur de votre téléphone
2️⃣ Convertissez sur ezgif.com

📸 Ou utilisez "PNG" pour une image fixe`);
        }

        // ============ INITIALISATION ============

        document.getElementById("listeParticipants").addEventListener("input", chargerParticipants);
        document.getElementById("titre").addEventListener("input", majAffichage);
        document.getElementById("soustitre").addEventListener("input", majAffichage);

        window.addEventListener('DOMContentLoaded', function() {
            chargerParticipants();
            majAffichage();
            verifierSupportEnregistrement();
            
            if (participants.length === 0) {
                document.getElementById("roulette").innerHTML = "Ajoutez des participants";
            }
        });

        document.addEventListener('touchend', function(e) {
            if (e.target.closest('button')) {
                e.preventDefault();
            }
        }, { passive: false });

        console.log("📱 Application prête");
    </script>

</body>
</html>
